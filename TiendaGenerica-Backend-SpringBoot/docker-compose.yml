version: "3.9"

services:

  # =========================
  # MYSQL
  # =========================
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./TiendaGenerica-Backend-SpringBoot/init-databases:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - backend_net

  # =========================
  # EUREKA (X2)
  # =========================
  eureka-server-1:
    build: ./TiendaGenerica-Backend-SpringBoot/eureka-server
    ports:
      - "8761:8761"
    networks:
      - backend_net

  eureka-server-2:
    build: ./TiendaGenerica-Backend-SpringBoot/eureka-server
    networks:
      - backend_net

  # =========================
  # API GATEWAY (X2)
  # =========================
  api-gateway-1:
    build: ./TiendaGenerica-Backend-SpringBoot/api-gateway
    depends_on:
      - eureka-server-1
    networks:
      - backend_net

  api-gateway-2:
    build: ./TiendaGenerica-Backend-SpringBoot/api-gateway
    depends_on:
      - eureka-server-1
    networks:
      - backend_net

  # =========================
  # AUTH SERVICE (X2)
  # =========================
  authentication-service-1:
    build: ./TiendaGenerica-Backend-SpringBoot/authentication-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  authentication-service-2:
    build: ./TiendaGenerica-Backend-SpringBoot/authentication-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  # =========================
  # BUY SERVICE (X2)
  # depende de catalog + supplier
  # =========================
  buy-service-1:
    build: ./TiendaGenerica-Backend-SpringBoot/buy-service
    depends_on:
      - catalog-service-1
      - supplier-service-1
      - eureka-server-1
    networks:
      - backend_net

  buy-service-2:
    build: ./TiendaGenerica-Backend-SpringBoot/buy-service
    depends_on:
      - catalog-service-2
      - supplier-service-2
      - eureka-server-1
    networks:
      - backend_net

  # =========================
  # CATALOG SERVICE (X2)
  # =========================
  catalog-service-1:
    build: ./TiendaGenerica-Backend-SpringBoot/catalog-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  catalog-service-2:
    build: ./TiendaGenerica-Backend-SpringBoot/catalog-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  # =========================
  # CLIENT SERVICE (X2)
  # =========================
  client-service-1:
    build: ./TiendaGenerica-Backend-SpringBoot/client-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  client-service-2:
    build: ./TiendaGenerica-Backend-SpringBoot/client-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  # =========================
  # SALE SERVICE (X2)
  # depende de catalog + client
  # =========================
  sale-service-1:
    build: ./TiendaGenerica-Backend-SpringBoot/sale-service
    depends_on:
      - catalog-service-1
      - client-service-1
      - eureka-server-1
    networks:
      - backend_net

  sale-service-2:
    build: ./TiendaGenerica-Backend-SpringBoot/sale-service
    depends_on:
      - catalog-service-2
      - client-service-2
      - eureka-server-1
    networks:
      - backend_net

  # =========================
  # SUPPLIER SERVICE (X2)
  # =========================
  supplier-service-1:
    build: ./TiendaGenerica-Backend-SpringBoot/supplier-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  supplier-service-2:
    build: ./TiendaGenerica-Backend-SpringBoot/supplier-service
    depends_on:
      - mysql
      - eureka-server-1
    networks:
      - backend_net

  # =========================
  # FRONTEND (X2)
  # =========================
  frontend-1:
    build: ./TiendaGenerica-Frontend-React
    networks:
      - frontend_net

  frontend-2:
    build: ./TiendaGenerica-Frontend-React
    networks:
      - frontend_net

  # =========================
  # NGINX FRONT (BALANCEADOR)
  # =========================
  nginx-frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx-frontend.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend-1
      - frontend-2
    networks:
      - frontend_net
      - backend_net

networks:
  backend_net:
  frontend_net: