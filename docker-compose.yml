    healthcheck:
      <<: *nginx-healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]

  # =========================
  # NGINX FRONTEND (SPA Load Balancer)
  # Port 3000 es accesible desde host para la app
  # =========================
  nginx-frontend:
    image: nginx:alpine
    container_name: nginx-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./nginx/nginx-frontend.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend-1:
        condition: service_healthy
      frontend-2:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      <<: *nginx-healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]

# =========================
# NETWORKS
# =========================
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

# =========================
# VOLUMES
# =========================
volumes:
  mysql_data:
