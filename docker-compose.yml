x-spring-healthcheck-defaults: &spring-healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 30s

x-nginx-healthcheck-defaults: &nginx-healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 10s

services:

  # =========================
  # MYSQL DATABASE
  # =========================
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - ./TiendaGenerica-Backend-SpringBoot/init-databases:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =========================
  # EUREKA SERVER (Service Discovery)
  # =========================
  eureka-server-1:
    build: ./TiendaGenerica-Backend-SpringBoot/eureka-server
    container_name: eureka-server-1
    restart: always
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server-1
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
      SERVER_PORT: "8761"
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    networks:
      - backend_net
    healthcheck:
      <<: *spring-healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]

  eureka-server-2:
    build: ./TiendaGenerica-Backend-SpringBoot/eureka-server
    container_name: eureka-server-2
    restart: always
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server-2
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server-1:8761/eureka/}
      SERVER_PORT: "8761"
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    depends_on:
      eureka-server-1:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      <<: *spring-healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]

  # =========================
  # API GATEWAY (X2) - Spring Cloud Gateway
  # =========================
  api-gateway-1:
    build: ./TiendaGenerica-Backend-SpringBoot/api-gateway
    container_name: api-gateway-1
    restart: always
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server-1:8761/eureka/}
      SPRING_APPLICATION_NAME: "api-gateway"
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      GATEWAY_SECRET: ${GATEWAY_SECRET:-change-me-in-production}
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    depends_on:
      eureka-server-1:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      <<: *spring-healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/internal/health"]
      start_period: 15s

  api-gateway-2:
    build: ./TiendaGenerica-Backend-SpringBoot/api-gateway
    container_name: api-gateway-2
    restart: always
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server-1:8761/eureka/}
      SPRING_APPLICATION_NAME: "api-gateway"
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      GATEWAY_SECRET: ${GATEWAY_SECRET:-change-me-in-production}
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    depends_on:
      eureka-server-1:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      <<: *spring-healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/internal/health"]
      start_period: 15s

  # =========================
  # NGINX GATEWAY (External Proxy)
  # Port 8080 es accesible desde host
  # =========================
  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: always
    ports:
      - "${API_GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx-gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway-1:
        condition: service_healthy
      api-gateway-2:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      <<: *nginx-healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]

  # =========================
  # AUTHENTICATION SERVICE (X2)
  # =========================
  authentication-service-1:
    build: ./TiendaGenerica-Backend-SpringBoot/authentication-service
    container_name: authentication-service-1
    restart: always
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: authenticationservice
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server-1:8761/eureka/}
      SPRING_APPLICATION_NAME: "authentication-service"
      SERVER_PORT: "8081"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      GATEWAY_SECRET: ${GATEWAY_SECRET:-change-me-in-production}
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      <<: *spring-healthcheck-defaults
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/); echo $$code | grep -Eq '^(401|403|404|405)$$'"]

